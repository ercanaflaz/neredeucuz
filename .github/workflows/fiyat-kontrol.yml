name: Fiyat Alarmı Kontrolü

# marketfiyati Cloudflare'i engellediği için fiyat kontrolü GitHub runner'ında yapılır.
on:
  schedule:
    - cron: '0 */3 * * *'   # her 3 saatte bir (UTC)
  workflow_dispatch: {}      # panelden elle tetikleme (test için)

jobs:
  kontrol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund
      - name: Fiyatları kontrol et ve bildirim gönder
        run: node scripts/fiyat-kontrol.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VAPID_PRIVATE_JWK: ${{ secrets.VAPID_PRIVATE_JWK }}
